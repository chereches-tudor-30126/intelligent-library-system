server:
  port: 8080
  # FIX 1: context-path ELIMINAT — controllerele au deja /api/v1 in @RequestMapping
  # Daca pastrezi context-path, URL-urile devin /api/v1/api/v1/auth/login

spring:
  application:
    name: intelligent-library-system

  datasource:
    # FIX 2: library_db → library_system (baza creata de tine in DBeaver)
    url: jdbc:postgresql://localhost:5432/library_system
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# FIX 3: property path-urile TREBUIE sa fie identice cu @Value din JwtService
# JwtService citeste: ${jwt.secret}, ${jwt.access-token-expiration}, ${jwt.refresh-token-expiration}
# Vechiul yml avea: app.security.jwt.secret-key — NU se potrivea, de aceea crasha
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  max-sessions-per-user: 5

library:
  borrow:
    duration-days: 14
    max-extensions: 2
    extension-days: 7
    fine-per-day: 0.50
    max-active-borrows: 5

messaging:
  websocket:
    endpoint: /ws-notifications
    allowed-origins: "http://localhost:3000"

logging:
  level:
    root: INFO
    com.library: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"